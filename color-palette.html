<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ObserveOps · Color System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07101f; --nav:#0c1a2e; --card:#11223a; --card2:#0f1d33; --border:#18304a;
  --text:#c2d4e8; --muted:#5272a0; --teal:#14b8a6; --teal-d:#04241f;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:radial-gradient(1100px 520px at 82% -12%,#0c1d33,transparent),var(--bg);
  color:var(--text);font:13px/1.5 Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace}

header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;
  padding:13px 24px;background:rgba(7,16,31,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.backbtn{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--card);padding:7px 12px;border-radius:9px;transition:.15s;white-space:nowrap}.backbtn:hover{color:var(--teal);border-color:#14b8a455;background:#0e2236}.backbtn svg{width:14px;height:14px}
.brand{display:flex;align-items:center;gap:11px}
.brand h1{margin:0;font-size:15.5px;font-weight:700;letter-spacing:-.2px;line-height:1.05}
.brand .sub{color:var(--muted);font-size:11px;margin-top:1px}
.spacer{flex:1}
.hint{color:var(--muted);font-size:11px;white-space:nowrap}
.theme{display:inline-flex;background:var(--nav);border:1px solid var(--border);border-radius:9px;padding:3px}
.theme button{padding:6px 13px;border-radius:7px;cursor:pointer;color:var(--muted);font-weight:600;font-size:12px;
  border:0;background:none;display:flex;align-items:center;gap:6px}
.theme button.on{background:var(--teal);color:var(--teal-d)}
.theme button.on svg{stroke:var(--teal-d)}
#q{width:260px;background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:9px 13px;border-radius:9px;font:12px Inter,sans-serif;outline:none}
#q:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(20,184,166,.12)}

.layout{display:flex;align-items:flex-start}
#side{position:sticky;top:56px;flex:none;width:214px;height:calc(100vh - 56px);overflow-y:auto;
  padding:16px 12px 30px;border-right:1px solid var(--border)}
.navhead{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);opacity:.7;margin:14px 11px 6px}
.navitem{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 11px;border-radius:8px;
  cursor:pointer;color:var(--muted);font-size:12px;font-weight:500}
.navitem:hover{background:var(--card)}
.navitem.on{background:var(--card);color:var(--text)}
.navitem.on .nbadge{background:var(--teal);color:var(--teal-d);border-color:transparent}
.navitem span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nbadge{flex:none;background:var(--nav);border:1px solid var(--border);border-radius:20px;padding:1px 8px;font-size:10px;font-weight:600}
.sidefoot{margin:16px 11px 0;padding-top:14px;border-top:1px solid var(--border);color:var(--muted);font-size:10.5px;line-height:1.7}
kbd{background:var(--nav);border:1px solid var(--border);border-radius:4px;padding:0 4px;font:10px 'JetBrains Mono',monospace}

main{flex:1;min-width:0;padding:20px 26px 90px}
.section{margin-top:32px;scroll-margin-top:72px}
.section:first-child{margin-top:4px}
.shead{display:flex;align-items:baseline;gap:10px;margin:0 0 14px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.shead h2{margin:0;font-size:15px;font-weight:700;letter-spacing:-.1px;color:var(--text);text-transform:capitalize}
.shead .cc{color:var(--muted);font-size:12px;font-weight:500}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(198px,1fr));gap:13px}

.sw{position:relative;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;
  cursor:pointer;transition:transform .1s,border-color .1s,box-shadow .1s}
.sw:hover{transform:translateY(-3px);border-color:var(--teal);box-shadow:0 12px 28px rgba(0,0,0,.4)}
.chip{height:72px;position:relative;
  background-image:linear-gradient(45deg,#243b57 25%,transparent 25%),linear-gradient(-45deg,#243b57 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#243b57 75%),linear-gradient(-45deg,transparent 75%,#243b57 75%);
  background-size:14px 14px;background-position:0 0,0 7px,7px -7px,-7px 0}
.chip span.fill{position:absolute;inset:0}
.copy{position:absolute;top:8px;right:8px;width:25px;height:25px;border-radius:7px;background:rgba(7,16,31,.5);
  backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;opacity:0;transition:.12s;color:#fff}
.sw:hover .copy{opacity:1}
.meta{padding:10px 12px}
.nm{font-size:11px;font-weight:500;word-break:break-all;color:var(--text)}
.nm.al{color:var(--muted);font-weight:400;font-size:10px;margin-top:1px}
.cc{color:var(--muted);font-weight:600;font-size:11px}
.hx{margin-top:7px;display:flex;gap:7px;align-items:center;font-size:12px}
.hx b{color:var(--text);font-weight:600;letter-spacing:.3px}
.a{background:var(--nav);border:1px solid var(--border);border-radius:5px;padding:0 5px;font-size:10px;color:var(--teal)}

.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 11px 3px 8px;border-radius:999px;
  font-size:11px;font-weight:600;margin-bottom:8px}
.badge .dot{width:7px;height:7px;border-radius:50%}

.banner{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:15px}
.blab{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:11px}
.spectrum{display:flex;height:18px;border-radius:6px;overflow:hidden;margin-bottom:13px}
.spectrum i{flex:1}
.pills{display:flex;flex-wrap:wrap;gap:8px}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--teal);
  color:var(--teal-d);font-weight:600;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;
  pointer-events:none;box-shadow:0 10px 32px rgba(0,0,0,.45)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

</header>
<div class="layout">

  <main id="main"></main>
</div>

{"name": "--notification-subtitle-color", "raw": "#cad3e2", "hex": "#cad3e2", "alpha": null, "section": "notification dropdown"}, {"name": "--notification-dropdown-datetime-color", "raw": "#8e9fbc", "hex": "#8e9fbc", "alpha": null, "section": "notification dropdown"}, {"name": "--alert-notification-popup-background-color", "raw": "#282828", "hex": "#282828", "alpha": null, "section": "notification dropdown"}, {"name": "--alert-notification-popup-border-color", "raw": "rgb(22, 22, 22)", "hex": "#161616", "alpha": null, "section": "notification dropdown"}, {"name": "--screenshot-share-overlay-bg", "raw": "rgba(255, 255, 255, 0.4)", "hex": "#ffffff", "alpha": 40, "section": "screenshot share"}, {"name": "--screenshot-share-form-bg", "raw": "var(--page-background-color)", "hex": "#07101f", "alpha": null, "section": "screenshot share"}, {"name": "--partition-icon-background-color", "raw": "#2b394f", "hex": "#2b394f", "alpha": null, "section": "template widget specific"}, {"name": "--partition-icon-text-color", "raw": "var(--page-text-color)", "hex": "#cad3e2", "alpha": null, "section": "template widget specific"}, {"name": "--availability-icon-background-color", "raw": "#2b394f", "hex": "#2b394f", "alpha": null, "section": "template widget specific"}, {"name": "--availability-icon-text-color", "raw": "var(--page-text-color)", "hex": "#cad3e2", "alpha": null, "section": "template widget specific"}, {"name": "--switch-port-view-bg", "raw": "#485975", "hex": "#485975", "alpha": null, "section": "template widget specific"}, {"name": "--gauge-base-color", "raw": "#404244", "hex": "#404244", "alpha": null, "section": "template widget specific"}, {"name": "--gauge-text-color", "raw": "var(--white-regular)", "hex": "#ffffff", "alpha": 80, "section": "template widget specific"}, {"name": "--topology-graph-tooltip-bg", "raw": "#07101f", "hex": "#07101f", "alpha": null, "section": "topology variables"}, {"name": "--topology-graph-tooltip-text-color", "raw": "#fff", "hex": "#ffffff", "alpha": null, "section": "topology variables"}, {"name": "--pan-btn-bg", "raw": "#2b394f", "hex": "#2b394f", "alpha": null, "section": "topology variables"}, {"name": "--pan-btn-border", "raw": "#485975", "hex": "#485975", "alpha": null, "section": "topology variables"}, {"name": "--overlay-bg", "raw": "rgba(255, 255, 255, 0.25)", "hex": "#ffffff", "alpha": 25, "section": "overlay"}, {"name": "--dashboard-background", "raw": "#0b1627", "hex": "#0b1627", "alpha": null, "section": "dashboard"}, {"name": "--widget-background-color", "raw": "#172336", "hex": "#172336", "alpha": null, "section": "dashboard"}, {"name": "--timerange-background-color", "raw": "#2b394f", "hex": "#2b394f", "alpha": null, "section": "dashboard"}, {"name": "--timerange-text-color", "raw": "var(--primary)", "hex": "#e3e8f2", "alpha": null, "section": "dashboard"}, {"name": "--widget-background", "raw": "#0b1627", "hex": "#0b1627", "alpha": null, "section": "dashboard"}, {"name": "--widget-box-shadow", "raw": "#000", "hex": "#000000", "alpha": null, "section": "dashboard"}, {"name": "--tour-metric-bg-color", "raw": "#142c40", "hex": "#142c40", "alpha": null, "section": "tour section background"}, {"name": "--tour-log-bg-color", "raw": "#236777", "hex": "#236777", "alpha": null, "section": "tour section background"}, {"name": "--tour-flow-bg-color", "raw": "#376842", "hex": "#376842", "alpha": null, "section": "tour section background"}, {"name": "--chart-null-color", "raw": "var(--neutral-darkest)", "hex": "#000000", "alpha": null, "section": "Chart Colors"}, {"name": "--bar-chart-color", "raw": "#14b8a6", "hex": "#14b8a6", "alpha": null, "section": "Chart Colors"}, {"name": "--filter-background", "raw": "var(--secondery-focus-bg)", "hex": "#172336", "alpha": null, "section": "filter background"}, {"name": "--license-background", "raw": "var(--page-background-color)", "hex": "#07101f", "alpha": null, "section": "license background"}, {"name": "--topology-background", "raw": "var(--code-tag-background-color)", "hex": "#172336", "alpha": null, "section": "topology background color"}, {"name": "--chart-grid-line-color", "raw": "rgba(23, 35, 54, 0.8)", "hex": "#172336", "alpha": 80, "section": "gridLineColor"}, {"name": "--bottom-line-color", "raw": "rgba(23, 35, 54, 1)", "hex": "#172336", "alpha": null, "section": "lineColor"}, {"name": "--chart-type-icon", "raw": "#fff", "hex": "#ffffff", "alpha": null, "section": "chart-type-icon"}, {"name": "--chart-line-type-icon", "raw": "#8e9fbc", "hex": "#8e9fbc", "alpha": null, "section": "chart-line-type-icon"}, {"name": "--status-progress-color", "raw": "#485564ad", "hex": "#485564", "alpha": 68, "section": "policy-border-color"}, {"name": "--map-line-color", "raw": "var(--border-color)", "hex": "#1d2a3e", "alpha": null, "section": "policy-border-color"}, {"name": "--timeline-scrollbar-background-color", "raw": "#1d2a3e", "hex": "#1d2a3e", "alpha": null, "section": "policy-border-color"}, {"name": "--control-btn-bg", "raw": "rgba(52, 152, 219, 0.2)", "hex": "#3498db", "alpha": 20, "section": "policy-border-color"}, {"name": "--timeline-indicator-color", "raw": "var(--border-color)", "hex": "#1d2a3e", "alpha": null, "section": "policy-border-color"}, {"name": "--apm-heatmap-border-color", "raw": "var(--grid-row-border-color)", "hex": "#172336", "alpha": 70, "section": "policy-border-color"}, {"name": "--apm-heatmap-hover-color", "raw": "#1d2a3e", "hex": "#1d2a3e", "alpha": null, "section": "policy-border-color"}, {"name": "--help-card-bg-color", "raw": "rgba(43, 57, 79, 0.3)", "hex": "#2b394f", "alpha": 30, "section": "help card background color"}, {"name": "--notification-dropdown-header-footer", "raw": "#2b394f", "hex": "#2b394f", "alpha": null, "section": "help card background color"}]};
let theme='root', q='', activeCat='All';
const main=document.getElementById('main'), side=document.getElementById('side'),
      countEl=document.getElementById('count'), toast=document.getElementById('toast');
const COPY='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>';

function catOf(s){
  if(/^--severity-[a-z]+$/.test(s.name)) return 'Severity';   // base severity only
  if(/severity/.test(s.name)) return null;                    // hide -lighter/-lightest/-darker/-dot-box tints
  if(/chart|sparkline|^--hc-|bar-chart/.test(s.name)) return 'Chart';
  return s.section;
}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-');}
function rgbParts(h){const n=parseInt(h.slice(1),16);return [(n>>16)&255,(n>>8)&255,n&255];}
function hexA(h,a){const p=rgbParts(h);return 'rgba('+p[0]+','+p[1]+','+p[2]+','+(a/100)+')';}
function rgba(h,a){const p=rgbParts(h);return 'rgba('+p[0]+','+p[1]+','+p[2]+','+a+')';}
function sevLabel(names){const out=[];names.forEach(n=>{const l=n.replace('--severity-','').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());if(!out.includes(l))out.push(l);});return out.join(' / ');}

function build(){
  const order=[], cats={};
  for(const s of DATA[theme]){
    const c=catOf(s); if(c===null) continue;
    if(!cats[c]){cats[c]=new Map();order.push(c);}
    const key=s.hex+'@'+(s.alpha==null?'':s.alpha);   // dedupe identical colors
    if(!cats[c].has(key)) cats[c].set(key,{hex:s.hex,alpha:s.alpha,names:[]});
    cats[c].get(key).names.push(s.name);
  }
  return {order,cats};
}
function badge(hex,label){
  return '<span class="badge" style="color:'+hex+';background:'+rgba(hex,.14)+';border:1px solid '+rgba(hex,.32)+'">'
    +'<span class="dot" style="background:'+hex+'"></span>'+esc(label)+'</span>';
}
function card(e,sev){
  const a=e.alpha==null?'':'<span class="a">'+e.alpha+'%</span>';
  const fill=e.alpha==null?e.hex:hexA(e.hex,e.alpha);
  const head=sev?badge(e.hex,sevLabel(e.names)):'';
  const names=e.names.map((n,i)=>'<div class="nm mono'+(i?' al':'')+'">'+esc(n)
      +(i?'':(e.names.length>1?' <span class="cc">+'+(e.names.length-1)+'</span>':''))+'</div>').join('');
  return '<div class="sw" data-hex="'+e.hex+'" data-tok="'+esc(e.names[0])+'">'
    +'<div class="chip"><span class="fill" style="background:'+fill+'"></span><span class="copy">'+COPY+'</span></div>'
    +'<div class="meta">'+head+names+'<div class="hx mono"><b>'+e.hex+'</b>'+a+'</div></div></div>';
}
function banner(cat,entries){
  if(cat==='Chart'){
    const cols=entries.map(e=>e.hex);
    const spec=cols.map(h=>'<i style="background:'+h+'"></i>').join('');
    const W=640,H=120,N=15,series=cols.slice(0,7);let paths='';
    series.forEach((h,si)=>{let d='';for(let i=0;i<N;i++){
      const x=(i/(N-1))*W;
      const y=H/2 - Math.sin(i*0.72+si*1.15)*((H/2-16)*0.72) - Math.cos(i*0.33+si*0.6)*9;
      d+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';}
      paths+='<path d="'+d+'" fill="none" stroke="'+h+'" stroke-width="2" stroke-linecap="round"/>';});
    return '<div class="banner"><div class="blab">Chart series preview · '+entries.length+' colors</div>'
      +'<div class="spectrum">'+spec+'</div>'
      +'<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="118" preserveAspectRatio="none">'+paths+'</svg></div>';
  }
  if(cat==='Severity'){
    const pills=entries.map(e=>badge(e.hex,sevLabel(e.names))).join('');
    return '<div class="banner"><div class="blab">Status scale · how these read as alert states</div>'
      +'<div class="pills">'+pills+'</div></div>';
  }
  return '';
}
function render(){
  const ql=q.toLowerCase();
  const {order,cats}=build();
  const counts={}; let allCount=0;
  for(const c of order){counts[c]=cats[c].size; allCount+=counts[c];}
  // sidebar
  let nav='<div class="navitem'+(activeCat==='All'?' on':'')+'" data-c="All"><span>All colors</span><span class="nbadge">'+allCount+'</span></div>';
  nav+='<div class="navhead">Categories</div>';
  for(const c of order)
    nav+='<div class="navitem'+(activeCat===c?' on':'')+'" data-c="'+esc(c)+'"><span>'+esc(c)+'</span><span class="nbadge">'+counts[c]+'</span></div>';
  nav+='<div class="sidefoot"><kbd>click</kbd> copy hex<br><kbd>shift</kbd>+click copy <span class="mono">var()</span></div>';
  side.innerHTML=nav;
  // main
  let total=0, html='';
  for(const c of order){
    if(activeCat!=='All' && c!==activeCat) continue;
    const entries=[...cats[c].values()].filter(e=>(e.names.join(' ')+' '+e.hex).toLowerCase().includes(ql));
    if(!entries.length) continue;
    total+=entries.length;
    html+='<section class="section" id="sec-'+slug(c)+'"><div class="shead"><h2>'+esc(c)+'</h2><span class="cc">'+entries.length+' colors</span></div>';
    html+=banner(c,entries);
    html+='<div class="grid">';
    for(const e of entries) html+=card(e, c==='Severity');
    html+='</div></section>';
  }
  countEl.textContent=total+' unique colors · '+(theme==='root'?'Light theme':'Dark theme');
  main.innerHTML=html||'<div class="section" style="color:var(--muted)">No colors match "'+esc(q)+'".</div>';
}

document.querySelectorAll('.theme button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.theme button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); theme=b.dataset.t; render();
});
side.onclick=e=>{const it=e.target.closest('.navitem'); if(!it)return;
  activeCat=it.dataset.c; render(); window.scrollTo({top:0,behavior:'smooth'});};
document.getElementById('q').oninput=e=>{q=e.target.value;render();};
main.onclick=e=>{const sw=e.target.closest('.sw'); if(!sw)return;
  const val=e.shiftKey?('var('+sw.dataset.tok+')'):sw.dataset.hex;
  navigator.clipboard.writeText(val);
  toast.textContent='Copied '+val; toast.classList.add('show');
  clearTimeout(window._t); window._t=setTimeout(()=>toast.classList.remove('show'),1200);
};
render();
</script>
